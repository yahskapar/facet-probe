correspondence:
  - paper_element: Release-wide reproducibility map
    artifacts:
      - artifacts/reproducibility_matrix.md
  - paper_element: Main Figure 2 and Table 1 per-facet flip rates
    artifacts:
      - artifacts/paper/dataset_summary.csv
      - artifacts/paper/per_facet_per_model.csv
      - artifacts/paper/panel_means.csv
      - artifacts/paper/screened_panel_values.json
      - artifacts/provenance/screened_panel_values.md
  - paper_element: Main Table 2 ODI decomposition and appendix posterior intervals
    artifacts:
      - artifacts/odi/facet_decomposition.csv
      - artifacts/odi/posterior_intervals.csv
      - artifacts/odi/irt_v4_modal_per_facet_summary.json
      - artifacts/odi/irt_v4_modal_theta.json
      - artifacts/odi/irt_v4_modal_diagnostics.json
      - artifacts/odi/irt_v4_modal_per_item_params.parquet
      - artifacts/odi/irt_input_summary.json
      - artifacts/odi/irt_v4_correct_per_facet_summary.json
      - artifacts/odi/irt_v4_correct_theta.json
      - artifacts/odi/irt_v4_correct_diagnostics.json
      - artifacts/odi/irt_v4_correct_per_item_params.parquet
      - artifacts/provenance/screened_odi_fit_audit.md
      - artifacts/provenance/odi_posterior_interval_audit.md
  - paper_element: Image-set position-reference screen and screened image rates
    artifacts:
      - artifacts/screens/imageset_position_reference_screen.csv
      - artifacts/screens/imageset_position_reference_screen_summary.json
      - artifacts/paper/image_set_screened_rates.csv
      - artifacts/odi/screen_filter_metadata.json
  - paper_element: Mixed-modality sem-flip cells
    artifacts:
      - artifacts/paper/mixed_modality_cells.csv
      - artifacts/paper/screened_panel_values.json
  - paper_element: Appendix robustness and decoder-noise decomposition
    artifacts:
      - artifacts/robustness/decoder_decomp_screened_by_facet.csv
      - artifacts/robustness/decoder_decomp_screened.json
      - artifacts/provenance/decoder_decomp_screened_audit.md
  - paper_element: Main Table 4 and appendix mitigation cost-Pareto results
    artifacts:
      - artifacts/mitigation/policy_means.csv
      - artifacts/mitigation/mitigation_screened_values.json
      - artifacts/mitigation/mitigation_menu_summary.json
      - artifacts/mitigation/pareto_frontier_points.json
      - artifacts/provenance/mitigation_screened_values.md
  - paper_element: Main Figure 4 and appendix CTA/think-budget mitigation results
    artifacts:
      - artifacts/mitigation/cta_flip_summary.csv
      - artifacts/mitigation/think_budget_sweep.csv
      - artifacts/provenance/cta_think_budget_summary.md

excluded_by_design:
  - upstream dataset text, images, tables, and prompts
  - provider credentials and local caches
  - raw 78GB internal experiment tree
  - multi-gigabyte NumPyro posterior traces and pickle multitraces

materializer: scripts/materialize_release_artifacts.py
