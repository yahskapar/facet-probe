name: tests

"on":
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Check setup scripts
        if: matrix.python-version == '3.11'
        run: |
          bash setup.sh conda --dry-run
          bash setup.sh uv --dry-run
      - name: Lint
        if: matrix.python-version == '3.11'
        run: python -m ruff check .
      - name: Test
        run: python -m pytest
      - name: Run examples
        run: |
          python examples/python_library_usage.py
          python examples/quickstart_profile.py
      - name: CI paper-run fixture
        run: |
          facet-probe paper-run \
            --mock-model deterministic-mock \
            --items-jsonl examples/toy_items.jsonl \
            --k 3 \
            --output-dir "$RUNNER_TEMP/facet-probe-mock-smoke"
      - name: Verify artifacts
        run: facet-probe verify-artifacts
      - name: Audit release metadata
        if: matrix.python-version == '3.11'
        run: python scripts/audit_release.py --offline-only
      - name: Build package
        if: matrix.python-version == '3.11'
        run: python -m build
